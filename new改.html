<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KimaWeb | 主页 & 照片空间</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4472c4;
      --secondary: #6e96c4;
      --accent: #afd2fb;
      --bg: #f5f6fa;
      --card-bg: #fff;
      --border: #e5e6eb;
      --shadow: 0 4px 18px 0 rgba(30,40,90,0.06);
      --radius-md: 12px;
      --radius-lg: 18px;
      --text-main: #232b3a;
      --text-sub: #788199;
      --file-icon: #99b3e6;
      --folder-icon: #fcc940;
      --danger: #cb2431;
      --danger-bg: #fff3f1;
    }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* 顶部导航栏 */
    .header {
      width: 100%;
      background: var(--primary);
      color: #fff;
      padding: 1rem 2rem;
      box-shadow: 0 2px 10px rgba(30,40,90,0.04);
      position: sticky; top: 0; z-index: 99;
    }
    .header-container {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 2rem; flex-wrap: wrap;
    }
    .profile {
      display: flex; align-items: center; gap: 1rem; flex-shrink: 0;
    }
    .avatar {
      width: 54px; height: 54px; border-radius: 50%; object-fit: cover;
      border: 3px solid #dbeafe; background: #fff;
      box-shadow: 0 2px 8px #bdd6fa60;
    }
    .profile-info h1 {
      font-size: 1.24rem; font-weight: 600; margin-bottom: 0.2rem;
    }
    .profile-info .desc {
      color: #d1e3fa; font-size: .97rem; font-weight: 500;
    }
    .file-list {
      display: flex; gap: 0.7rem; flex: 1; justify-content: center;
      flex-wrap: wrap;
    }
    .file-item {
      padding: 0.55rem 1.1rem;
      background: #e6eefb;
      border-radius: 7px;
      cursor: pointer;
      font-size: .99rem;
      border: 1px solid #e0e8f3;
      color: var(--primary);
      transition: background .15s, color .15s, box-shadow .14s;
      box-shadow: 0 1.5px 6px #bdd6fa33;
    }
    .file-item:hover, .file-item.active {
      background: #bcd8fa;
      color: #222;
    }
    .contact {
      font-size: .93rem; color: #f1f7fe; min-width: 165px;
      text-align: right;
    }
    .contact a { color: #e8f1fc; text-decoration: none; font-weight: 500; }
    .contact a:hover { color: #bbdcfa; }
    .main {
      flex: 1; width: 100%; max-width: 1200px; margin: 0 auto; padding: 1.5rem;
      box-sizing: border-box;
      display: flex; flex-direction: column; gap: 2.2rem;
    }

    /* 通用卡片 */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--border);
      padding: 2rem 2.5rem;
      margin-bottom: 1rem;
    }

    /* 主页内容 */
    #content {
      padding: 0;
      border-radius: var(--radius-lg);
      min-height: 300px;
      background: transparent;
      box-shadow: none;
      border: none;
    }
    /* Markdown 渲染 */
    #content h1, #content h2, #content h3 {
      margin: 1.2rem 0 0.8rem; color: var(--primary);
    }
    #content p { margin: 0.7rem 0; }
    #content a { color: var(--primary); text-decoration: underline; }
    #content code {
      background: #f8fafc;
      padding: 0.13em .45em;
      border-radius: 4px;
      color: #4064a2;
      font-size: .96em;
    }
    #content pre {
      background: #f5f5fa;
      color: #34414d;
      border-radius: 7px;
      padding: 1em;
      margin: 1em 0;
      font-size: .98em;
      overflow-x: auto;
      border: 1.3px solid #e7edf4;
    }

    /* tab 控件 */
    .tab-bar {
      display: flex; margin-bottom: 1rem; gap: 1rem;
    }
    .tab-btn {
      background: #e6eefb; color: var(--primary); font-size: 1.05rem;
      border: none; border-radius: 6px 6px 0 0; padding: 0.55rem 1.25rem;
      cursor: pointer;
      transition: background .12s, color .12s;
      font-weight: 500; outline: none;
      position: relative; top: 2px;
    }
    .tab-btn.active {
      background: var(--card-bg);
      color: #222;
      border-bottom: 2.5px solid var(--primary);
      font-weight: 700;
    }

    /* 照片空间样式 */
    .photo-box .input-group {
      display: flex; gap: 10px; margin: 15px 0 20px 0;
    }
    .photo-box input[type="text"] {
      flex: 1;
      padding: 11px 15px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      transition: border .16s, box-shadow .16s;
      background: #f5f7fa;
    }
    .photo-box input[type="text"]:focus {
      border-color: var(--primary);
      outline: none;
      background: #e9f0fb;
      box-shadow: 0 0 6px 1px #bdd6fa55;
    }
    .photo-box button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 11px 23px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .16s, box-shadow .17s;
      font-weight: 500;
      box-shadow: 0 2px 8px #bdd6fa33;
      display: flex; align-items: center; gap: 8px;
    }
    .photo-box button:hover {
      background: #355ba5;
    }
    .breadcrumb {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 15px; padding: 10px 18px;
      background: #f1f5fa;
      border-radius: 8px;
      font-size: .97rem;
      border: 1px solid #e7edf4;
    }
    .breadcrumb a {
      color: var(--primary); text-decoration: none; display: flex; align-items: center;
    }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .separator { color: #adb1ba; }
    .view-options { display: flex; gap: 10px; margin-bottom: 18px; }
    .view-option {
      background: #f2f6fe; border: 1px solid #e3e7ed;
      border-radius: 6px; padding: 8px 16px;
      cursor: pointer;
      font-weight: 500; color: #586a92;
      transition: background .12s;
    }
    .view-option.active, .view-option:hover {
      background: #dbeafe;
      border-color: var(--primary);
      color: var(--primary);
    }

    /* 文件/图片网格 */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
    }
    .file-item {
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 13px 13px 11px 13px;
      transition: box-shadow 0.14s, border .12s, transform 0.13s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(30,40,90,.06);
      min-height: 90px;
      display: flex; flex-direction: column; align-items: center;
    }
    .file-item:hover {
      box-shadow: var(--shadow);
      border-color: var(--primary);
      transform: translateY(-2px) scale(1.03);
    }
    .file-thumbnail {
      width: 98%; height: 140px; object-fit: cover; border-radius: 6px;
      background: #e7eaf2;
      margin-bottom: 11px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .file-thumbnail img {
      width: 100%; height: 100%; object-fit: cover;
      border-radius: 6px; border: 1px solid #e2e4ec;
      transition: box-shadow .11s, transform .13s, border-color .13s;
    }
    .file-item:hover .file-thumbnail img {
      border-color: var(--primary);
      box-shadow: 0 4px 16px #bdd6fa44;
      transform: scale(1.04);
    }
    .file-icon {
      font-size: 27px; margin-bottom: 8px; color: var(--file-icon);
    }
    .folder-icon { color: var(--folder-icon); }
    .file-name {
      font-weight: 600; font-size: 1rem;
      margin-bottom: 3px; color: #1d2a48; word-break: break-all;
      text-align: center;
    }
    .file-size {
      color: #a1a9bb; font-size: 13px;
    }
    .file-actions {
      position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; opacity: 0;
      transition: opacity .13s;
    }
    .file-item:hover .file-actions { opacity: 1; }
    .file-action {
      background: #e3e8f0; border: 1px solid #e1e5ee; border-radius: 4px;
      width: 28px; height: 28px; display: flex; align-items: center; 
      justify-content: center; cursor: pointer; color: #4e6a95;
      transition: background .13s, color .13s;
    }
    .file-action:hover {
      background: var(--primary); color: #fff;
    }
    .list-thumbnail {
      width: 48px; height: 48px; object-fit: cover; border-radius: 3px; margin-right: 8px;
      border: 1px solid #e6eefd;
    }
    /* 列表 */
    .file-list-view { width: 100%; border-collapse: collapse; }
    .file-list-view th,
    .file-list-view td {
      padding: 9px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .file-list-view th { background: #f1f5fa; font-weight: 600; font-size: .99rem; }
    .file-list-view tr:hover { background: #f7faff; }
    .file-list-name { display: flex; align-items: center; gap: 6px; }
    .file-list-actions { display: flex; gap: 8px; }
    .file-list-action {
      padding: 5.5px 10px;
      background: #e3e8f0;
      border: 1px solid #e1e5ee;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      color: #4e6a95;
      font-weight: 500;
      display: flex; align-items: center; gap: 4px;
      transition: background .13s, color .13s;
    }
    .file-list-action:hover {
      background: var(--primary); color: #fff; 
    }

    /* 图片大图模态 */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(30,40,90,0.93); z-index: 10000; overflow: hidden;
      padding: 0; margin: 0;
    }
    .modal-content {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      max-width: 95%; max-height: 95%;
      object-fit: contain;
      background: #fff; border-radius: 7px; box-shadow: var(--shadow);
      outline: 1.5px solid #e7eaf0;
    }
    .modal-close, .modal-nav {
      position: fixed; z-index: 10001;
      border: none; background: #fff;
      color: var(--primary); font-size: 23px;
      border-radius: 50%; width: 43px; height: 43px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px #bdd6fa55;
      cursor: pointer; transition: background .13s;
    }
    .modal-close { top: 11px; right: 15px; font-size: 28px; }
    .modal-caption {
      position: fixed; bottom: 13px; left: 0; right: 0; text-align: center;
      color: var(--primary); background: #fffefc; padding: 12px; font-size: 17px; border-radius: 7px; z-index: 10001;
      box-shadow: 0 2px 10px #bdd6fa28;
      margin: 0 32vw;
    }
    .modal-nav {
      top: 50%; transform: translateY(-50%);
      background: #f5f7fa88;
    }
    .modal-prev { left: 15px; }
    .modal-next { right: 15px; }
    .modal-close:hover, .modal-nav:hover { background: #dbeafe; }

    /* 错误与加载 */
    .error {
      color: var(--danger);
      background: var(--danger-bg);
      border-radius: 6px;
      border: 1.3px solid #ffd4cf;
      padding: 13px 17px;
      margin-bottom: 18px;
      font-size: 1.08rem;
    }
    .loading {
      text-align: center; padding: 38px 0; color: #8da1c5; font-size: 17px;
    }
    .loading i { font-size: 33px; margin-bottom: 11px; color: var(--primary);}
    .back-button {
      display: inline-flex; align-items: center; gap: 8px; margin-bottom: 18px;
      padding: 9px 15px; background: #eef5fe; color: var(--primary);
      text-decoration: none; border-radius: 6px; border: 1px solid #e2e8f5;
      font-size: .99rem; transition: background .12s;
    }
    .back-button:hover { background: #ccdffe; color: #293964; }

    /* 底部版权 */
    .footer {
      text-align: center; margin: 2rem 0 1.1rem 0;
      color: #b2b9c7; font-size: 0.93rem;
      letter-spacing: .01em; opacity: .90;
      font-family: inherit;
    }
    @media (max-width: 850px) {
      .main { padding: 0.5rem; }
      .profile-info h1 { font-size: 1.1rem; }
      .card { padding: 1.1rem 0.5rem; }
      #content { min-height: 180px;}
    }
    @media (max-width: 600px) {
      .main { gap: 1.1rem; }
      .profile { gap: .5rem;}
      .avatar { width: 41px; height: 41px; }
      .header { padding: .8rem .5rem; }
      .card { padding: .7rem .31rem; }
      .breadcrumb { font-size: .90rem;}
      .modal-caption { font-size: 13px; margin: 0 6vw; }
      .modal-prev, .modal-next, .modal-close { width: 33px; height: 33px; font-size: 17px;}
      .file-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <div class="header">
    <div class="header-container">
      <div class="profile">
        <img class="avatar" src="touxiang.jpg" alt="kima头像">
        <div class="profile-info">
          <h1>Kima</h1>
          <p class="desc">wait for you...</p>
        </div>
      </div>
      <div id="fileList" class="file-list"></div>
      <div class="contact">
        <p>GitHub：<a href="https://github.com/whereyy/z-z" target="_blank">kima1202</a></p>
        <p>邮箱：<a href="mailto:2406265572@qq.com">2406265572@qq.com</a></p>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-home-btn"><i class="fa fa-home"></i> 主页</button>
      <button class="tab-btn" id="tab-photo-btn"><i class="fa fa-images"></i> 照片空间</button>
    </div>
    <!-- 主页内容卡片 -->
    <div class="card" id="home-card">
      <div id="content">
        <span class="loading">正在加载目录...</span>
      </div>
      <div class="footer">
        © 2025 - 2026 AydinWeb | 保留所有权利
      </div>
    </div>
    <!-- 照片空间功能卡片 -->
    <div class="card photo-box" id="photo-card" style="display:none;">
      <div class="input-group">
        <input type="text" id="repo-input" placeholder="输入GitHub仓库地址，例如: https://github.com/username/repository" value="https://github.com/whereyy/">
        <button id="load-btn"><i class="fas fa-folder-open"></i> 加载仓库</button>
      </div>
      <div id="content-area" class="content-area">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>请输入GitHub仓库URL并点击加载按钮开始浏览文件</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 大图预览模态框 -->
  <div id="image-modal" class="modal">
    <button class="modal-close" title="关闭">&times;</button>
    <button class="modal-nav modal-prev" title="上一张"><i class="fas fa-chevron-left"></i></button>
    <button class="modal-nav modal-next" title="下一张"><i class="fas fa-chevron-right"></i></button>
    <img class="modal-content" id="modal-image" alt="">
    <div class="modal-caption" id="modal-caption"></div>
  </div>

  <script>
    // ---- 页签切换 ----
    const tabHomeBtn = document.getElementById('tab-home-btn');
    const tabPhotoBtn = document.getElementById('tab-photo-btn');
    const homeCard = document.getElementById('home-card');
    const photoCard = document.getElementById('photo-card');
    tabHomeBtn.onclick = () => {
      tabHomeBtn.classList.add('active');
      tabPhotoBtn.classList.remove('active');
      homeCard.style.display = '';
      photoCard.style.display = 'none';
    };
    tabPhotoBtn.onclick = () => {
      tabPhotoBtn.classList.add('active');
      tabHomeBtn.classList.remove('active');
      homeCard.style.display = 'none';
      photoCard.style.display = '';
    };

    // ---- 主页 Markdown 加载 ----
    const contentDiv = document.getElementById("content");
    const fileList = document.getElementById("fileList");
    // 配置MD文件列表
    function loadMdFileList() {
      const mdFiles = ["content.md"];
      renderList(mdFiles);
    }
    function renderList(files) {
      fileList.innerHTML = "";
      files.forEach(file => {
        const item = document.createElement("div");
        item.className = "file-item";
        item.textContent = file.replace(".md", "");
        item.onclick = () => loadMarkdown(file);
        fileList.appendChild(item);
      });
      // 默认加载第一个
      loadMarkdown(files[0]);
    }
    async function loadMarkdown(file) {
      document.querySelectorAll('.file-item').forEach(item =>
        item.classList.toggle('active', item.textContent === file.replace('.md', ''))
      );
      contentDiv.innerHTML = "<span class='loading'>加载中...</span>";
      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error("文件不存在或已删除");
        const text = await res.text();
        contentDiv.innerHTML = marked.parse(text);
        bindMdLinks();
      } catch (err) {
        contentDiv.innerHTML = `<span class="error">⚠️ ${file} 不存在或无法加载</span>`;
      }
    }
    function bindMdLinks() {
      document.querySelectorAll('#content a[href$=".md"]').forEach(link => {
        link.onclick = (e) => {
          e.preventDefault();
          const file = link.getAttribute("href");
          loadMarkdown(file);
        };
      });
    }
    loadMdFileList();

    // ---- 照片空间 功能 ----
    const loadBtn = document.getElementById('load-btn');
    const repoInput = document.getElementById('repo-input');
    const contentArea = document.getElementById('content-area');
    const imageModal = document.getElementById('image-modal');
    const modalImage = document.getElementById('modal-image');
    const modalCaption = document.getElementById('modal-caption');
    const modalClose = document.querySelector('.modal-close');
    const modalPrev = document.querySelector('.modal-prev');
    const modalNext = document.querySelector('.modal-next');
    let currentImages = [];
    let currentImageIndex = 0;
    let currentView = 'grid';
    let currentPath = '';
    let currentUsername = '';
    let currentRepo = '';
    // 页面加载时自动加载示例仓库
    setTimeout(() => {
      loadRepoContents('whereyy', 'z-z', '');
    }, 1000);

    loadBtn.addEventListener('click', function() {
      const repoUrl = repoInput.value.trim();
      if (!repoUrl) return showError('请输入GitHub仓库URL');
      const match = repoUrl.match(/github\.com\/([^\/]+)\/([^\/]+)/);
      if (!match) return showError('无效的GitHub仓库URL');
      const username = match[1];
      const repo = match[2].replace(/\.git$/, '');
      loadRepoContents(username, repo, '');
    });
    function showError(text) {
      contentArea.innerHTML = `<div class="error">${text}</div>`;
    }
    function loadRepoContents(username, repo, path) {
      contentArea.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>加载中...</p></div>';
      currentUsername = username;
      currentRepo = repo;
      currentPath = path;
      const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
      fetch(apiUrl)
        .then(response => {
          if (!response.ok) throw new Error('无法访问仓库，可能是私有仓库或不存在');
          return response.json();
        })
        .then(data => {
          if (Array.isArray(data)) {
            displayFileList(data, username, repo, path);
          } else if (data.type === 'file') {
            displayFileContent(data, username, repo, path);
          }
        })
        .catch(error => { showError(error.message); });
    }
    function displayFileList(files, username, repo, path) {
      const directories = files.filter(item => item.type === 'dir');
      const fileItems = files.filter(item => item.type === 'file');
      const imageFiles = fileItems.filter(item => isImageFile(item.name));
      currentImages = imageFiles.map((image, index) => ({
        ...image,
        index: index,
        downloadUrl: `https://raw.githubusercontent.com/${username}/${repo}/main/${image.path}`
      }));
      let html = "";

      // 面包屑
      if (path) {
        const pathParts = path.split('/').filter(Boolean);
        html += '<div class="breadcrumb">';
        html += `<a href="javascript:void(0)" data-path=""><i class="fas fa-home"></i> ${username}/${repo}</a>`;
        html += `<span class="separator">/</span>`;
        let currentPath = '';
        for (let i = 0; i < pathParts.length; i++) {
          currentPath += pathParts[i] + '/';
          html += `<a href="javascript:void(0)" data-path="${currentPath}">${pathParts[i]}</a>`;
          if (i < pathParts.length - 1) html += `<span class="separator">/</span>`;
        }
        html += '</div>';
      } else {
        html += `<div class="breadcrumb"><a href="javascript:void(0)" data-path=""><i class="fas fa-home"></i> ${username}/${repo}</a></div>`;
      }

      // 视图切换
      html += `<div class="view-options">
        <div class="view-option ${currentView === 'grid' ? 'active' : ''}" data-view="grid"><i class="fas fa-th"></i> 网格视图</div>
        <div class="view-option ${currentView === 'list' ? 'active' : ''}" data-view="list"><i class="fas fa-list"></i> 列表视图</div>
      </div>`;

      if (currentView === 'grid') {
        html += '<div class="file-grid">';
        if (path) {
          const parentPath = path.split('/').slice(0, -1).join('/');
          html += `<div class="file-item" data-path="${parentPath}" data-type="dir">
            <div class="file-thumbnail"><i class="fas fa-level-up-alt file-icon"></i></div>
            <div class="file-name">上级目录</div></div>`;
        }
        directories.forEach(item => {
          html += `<div class="file-item" data-path="${item.path}" data-type="${item.type}">
            <div class="file-thumbnail"><i class="fas fa-folder file-icon folder-icon"></i></div>
            <div class="file-name">${item.name}</div>
            <div class="file-size">文件夹</div></div>`;
        });
        fileItems.forEach(item => {
          const isImage = isImageFile(item.name);
          const rawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${item.path}`;
          html += `<div class="file-item" data-path="${item.path}" data-type="${item.type}" data-url="${item.html_url}">
            <div class="file-thumbnail">
              ${isImage ? `<img src="${rawUrl}" alt="${item.name}" loading="lazy" onclick="event.stopPropagation(); previewImageFromPath('${item.path}')">` :
              `<i class="fas fa-file file-icon"></i>`}
            </div>
            <div class="file-name">${item.name}</div>
            <div class="file-size">${formatFileSize(item.size)}</div>
            <div class="file-actions">
              <div class="file-action" title="下载" onclick="event.stopPropagation(); downloadFile('${item.name}', '${rawUrl}')"><i class="fas fa-download"></i></div>
              ${isImage ? `<div class="file-action" title="查看大图" onclick="event.stopPropagation(); previewImageFromPath('${item.path}')"><i class="fas fa-expand"></i></div>` : ''}
            </div></div>`;
        });
        html += '</div>';
      } else {
        html += `<table class="file-list-view"><thead>
        <tr><th>名称</th><th>大小</th><th>类型</th><th>操作</th></tr>
        </thead><tbody>`;
        if (path) {
          const parentPath = path.split('/').slice(0, -1).join('/');
          html += `<tr class="file-item" data-path="${parentPath}" data-type="dir">
            <td><div class="file-list-name"><i class="fas fa-level-up-alt"></i><span>上级目录</span></div></td><td>-</td><td>文件夹</td><td></td></tr>`;
        }
        directories.forEach(item => {
          html += `<tr class="file-item" data-path="${item.path}" data-type="${item.type}">
            <td><div class="file-list-name"><i class="fas fa-folder folder-icon"></i><span>${item.name}</span></div></td>
            <td>-</td><td>文件夹</td><td></td></tr>`;
        });
        fileItems.forEach(item => {
          const isImage = isImageFile(item.name);
          const fileType = isImage ? '图片' : getFileType(item.name);
          const rawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${item.path}`;
          html += `<tr class="file-item" data-path="${item.path}" data-type="${item.type}" data-url="${item.html_url}">
            <td>
              <div class="file-list-name">
                ${isImage ? `<img src="${rawUrl}" alt="${item.name}" class="list-thumbnail" onclick="event.stopPropagation(); previewImageFromPath('${item.path}')">` :
                  `<i class="fas fa-file file-icon"></i>`}
                <span>${item.name}</span>
              </div></td>
            <td>${formatFileSize(item.size)}</td>
            <td>${fileType}</td>
            <td><div class="file-list-actions">
              <div class="file-list-action" onclick="event.stopPropagation(); downloadFile('${item.name}', '${rawUrl}')"><i class="fas fa-download"></i> 下载</div>
              ${isImage ? `<div class="file-list-action" onclick="event.stopPropagation(); previewImageFromPath('${item.path}')"><i class="fas fa-expand"></i> 查看大图</div>` : ''}
            </div></td>
          </tr>`;
        });
        html += '</tbody></table>';
      }

      contentArea.innerHTML = html;
      contentArea.querySelectorAll('.file-item').forEach(item => {
        item.addEventListener('click', function() {
          const itemPath = this.getAttribute('data-path');
          const itemType = this.getAttribute('data-type');
          if (itemType === 'dir') loadRepoContents(username, repo, itemPath);
          else if (!isImageFile(itemPath)) {
            fetch(`https://api.github.com/repos/${username}/${repo}/contents/${itemPath}`)
              .then(response => response.json())
              .then(fileData => {
                displayFileContent(fileData, username, repo, itemPath);
              }).catch(error => { showError('无法加载文件内容: ' + error.message); });
          }
        });
      });
      contentArea.querySelectorAll('.view-option').forEach(option => {
        option.addEventListener('click', function() {
          currentView = this.getAttribute('data-view');
          displayFileList(files, username, repo, path);
        });
      });
      contentArea.querySelectorAll('.breadcrumb a[data-path]').forEach(link => {
        link.addEventListener('click', function() {
          loadRepoContents(username, repo, this.getAttribute('data-path'));
        });
      });
    }
    function displayFileContent(fileData, username, repo, path) {
      const content = atob((fileData.content || '').replace(/\s/g, ''));
      const pathParts = path.split('/').filter(Boolean);
      let breadcrumbHtml = '<div class="breadcrumb">';
      breadcrumbHtml += `<a href="javascript:void(0)" data-path=""><i class="fas fa-home"></i> ${username}/${repo}</a>`;
      breadcrumbHtml += `<span class="separator">/</span>`;
      let currentPath = '';
      for (let i = 0; i < pathParts.length - 1; i++) {
        currentPath += pathParts[i] + '/';
        breadcrumbHtml += `<a href="javascript:void(0)" data-path="${currentPath}">${pathParts[i]}</a>`;
        breadcrumbHtml += `<span class="separator">/</span>`;
      }
      breadcrumbHtml += `${pathParts[pathParts.length - 1]}</div>`;
      const parentPath = path.split('/').slice(0, -1).join('/');
      const backButton = `<a href="javascript:void(0)" class="back-button" data-path="${parentPath}"><i class="fas fa-arrow-left"></i> 返回</a>`;
      const downloadButton = `<button onclick="downloadFile('${pathParts[pathParts.length - 1]}', 'https://raw.githubusercontent.com/${username}/${repo}/main/${path}')" style="margin:5px 0 17px 10px;"><i class="fas fa-download"></i> 下载</button>`;

      let fileContent = '';
      if (isImageFile(path)) {
        const imageUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${path}`;
        fileContent = `<div class="image-preview" style="text-align:center;margin:30px 0;">
              <img src="${imageUrl}" alt="${path}" style="max-width:98%;max-height:470px;border-radius:8px;box-shadow:0 4px 15px #e8edf7;">
            </div>`;
      } else if (isTextFile(path)) {
        fileContent = `<div class="file-content">
              <h3 style="margin: 0 0 16px 0;">${pathParts[pathParts.length - 1]}</h3>
              <div class="code-content"><pre>${escapeHtml(content)}</pre></div>
            </div>`;
      } else {
        fileContent = `<div class="file-content">
              <h3>${pathParts[pathParts.length - 1]}</h3>
              <p style="color:#b24a33;">该文件为二进制，无法直接预览。</p>
            </div>`;
      }
      contentArea.innerHTML = backButton + breadcrumbHtml + downloadButton + fileContent;
      contentArea.querySelector('.back-button').addEventListener('click', function() {
        loadRepoContents(username, repo, this.getAttribute('data-path'));
      });
      contentArea.querySelectorAll('.breadcrumb a[data-path]').forEach(link => {
        link.addEventListener('click', function() {
          loadRepoContents(username, repo, this.getAttribute('data-path'));
        });
      });
    }
    // 图片大图预览逻辑
    window.previewImageFromPath = function(imagePath) {
      const imageIndex = currentImages.findIndex(img => img.path === imagePath);
      if (imageIndex !== -1) {
        previewImage(imageIndex);
      } else {
        const imageUrl = `https://raw.githubusercontent.com/${currentUsername}/${currentRepo}/main/${imagePath}`;
        modalImage.src = imageUrl;
        modalCaption.textContent = imagePath;
        imageModal.style.display = 'block';
        document.body.style.overflow = 'hidden';
      }
    }
    function previewImage(index) {
      currentImageIndex = index;
      const image = currentImages[index];
      modalImage.src = image.downloadUrl;
      modalCaption.textContent = `${image.name} (${formatFileSize(image.size)})`;
      imageModal.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      imageModal.style.display = 'none';
      document.body.style.overflow = '';
    }
    function navigateImage(direction) {
      currentImageIndex += direction;
      if (currentImageIndex < 0) currentImageIndex = currentImages.length - 1;
      else if (currentImageIndex >= currentImages.length) currentImageIndex = 0;
      const image = currentImages[currentImageIndex];
      modalImage.src = image.downloadUrl;
      modalCaption.textContent = `${image.name} (${formatFileSize(image.size)})`;
    }
    // 模态事件
    modalClose.onclick = closeModal;
    modalPrev.onclick = () => navigateImage(-1);
    modalNext.onclick = () => navigateImage(1);
    imageModal.onclick = (e) => { if (e.target === imageModal) closeModal(); }

    // 辅助函数
    window.downloadFile = function(filename, url) {
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.style.display = 'none';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };
    function isImageFile(name) { return /\.(jpe?g|png|webp|bmp|gif|svg)$/i.test(name); }
    function isTextFile(name) { return /\.(md|txt|js|py|json|html|css|c|java|go|sh|yaml?)$/i.test(name); }
    function getFileType(name) {
      if (isImageFile(name)) return '图片';
      if (isTextFile(name)) return '文本';
      return '文件';
    }
    function formatFileSize(bytes) {
      if (bytes == null) return '-';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
      if (bytes < 1073741824) return `${(bytes / 1048576).toFixed(2)} MB`;
      return `${(bytes / 1073741824).toFixed(2)} GB`;
    }
    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
